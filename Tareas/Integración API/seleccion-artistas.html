<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Seleccionar Artistas</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="bg-light">

<div class="container mt-5">

<h2 class="mb-4">Consulta de Tracks de Spotify</h2>

<!-- TOKEN -->
<div class="card mb-4">
<div class="card-body">
<h5>Guardar Token</h5>

<div class="input-group">
<input id="tokenInput" type="text" class="form-control" placeholder="Pega aquí tu token de Spotify">
<button class="btn btn-primary" onclick="guardarToken()">Guardar Token</button>
</div>

</div>
</div>

<!-- SELECT TRACK -->
<div class="card mb-4">
<div class="card-body">

<h5>Selecciona un track</h5>

<select id="trackSelect" class="form-select" onchange="buscarTrack()">
<option value="">Selecciona una canción</option>
<option value="6HU7h9RYOaPRFeh0R3UeAr">Deja Vu</option>
<option value="6De0lHrwBfPfrhorm9q1Xl">Me Reúso</option>
<option value="2lTm559tuIvatlT1u0JYG2">Baile Inolvidable</option>
<option value="3e32UUqXzrI4g2y5kNZrwC">Dopamina</option>
</select>

</div>
</div>

<!-- RESULTADO -->
<div id="resultado" class="mb-4"></div>

<!-- BOTON LIMPIAR -->
<button class="btn btn-secondary" onclick="limpiar()">Limpiar página</button>

</div>


<script>

function guardarToken(){

let token = document.getElementById("tokenInput").value;

sessionStorage.setItem("spotify_token", token);

alert("Token guardado correctamente");

}


function buscarTrack(){

let trackId = document.getElementById("trackSelect").value;

if(trackId === "") return;

let token = sessionStorage.getItem("spotify_token");

fetch(`https://api.spotify.com/v1/tracks/${trackId}`,{
headers:{
Authorization: "Bearer " + token
}
})
.then(res => res.json())
.then(data => mostrarTrack(data))
.catch(error => mostrarError());

}


function mostrarTrack(data){

let artistasHTML = "";

for(let i=0;i<data.artists.length;i++){

let artista = data.artists[i];

artistasHTML += crearArtista(artista);

}

let html = `
<div class="card">
<div class="card-body">

<h4>${data.name}</h4>

<p><strong>Tipo de track:</strong> ${data.album.album_type}</p>
<p><strong>Total de canciones:</strong> ${data.album.total_tracks}</p>
<p><strong>Nombre del álbum:</strong> ${data.album.name}</p>

<h5>Artistas</h5>

${artistasHTML}

</div>
</div>
`;

document.getElementById("resultado").innerHTML = html;

}


function crearArtista(artista){

return `
<div class="mb-2">
${artista.name} -
<a href="${artista.external_urls.spotify}" target="_blank">Perfil Spotify</a>
</div>
`;

}


function limpiar(){

document.getElementById("resultado").innerHTML = "";

document.getElementById("trackSelect").value = "";

}


function mostrarError(){

document.getElementById("resultado").innerHTML = `
<div class="alert alert-danger">
Hubo un error al llamar a la API de Spotify.
</div>
`;

}

</script>

</body>
</html>
